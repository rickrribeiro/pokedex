<div>
  <button class="back-btn" routerLink="/">Back to the list</button>
  @if (loading()) {
  <div class="loader-container">
    <div class="loader"></div>
  </div>
  } @else if (pokemon()) {
  <pokemon-detail-card [pokemon]="pokemon"></pokemon-detail-card>
  } @else {
  <p class="error-msg">Pokémon not found.</p>
  }
</div>
